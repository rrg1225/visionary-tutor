# Local-only dependency stack for the hybrid deployment:
# cloud = frontend/backend; local PC = MySQL/Redis/Chroma + RAG ingestion.
# Ports bind to 127.0.0.1 so an authenticated tunnel can forward them without
# exposing the containers directly on the LAN or public Internet.
name: visionary-local-deps

services:
  mysql:
    image: mysql:8.4
    container_name: visionary-local-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-visionary_tutor}
      MYSQL_USER: ${MYSQL_USER:-visionary}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    volumes:
      - local_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: visionary-local-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - local_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: visionary-local-chroma
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CHROMA_PORT:-8000}:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - local_chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  local_mysql_data:
  local_redis_data:
  local_chroma_data:

