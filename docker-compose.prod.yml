# Production dependency stack for VisionaryTutor (MySQL + Redis + ChromaDB).
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml ps
services:
  mysql:
    image: mysql:8.4
    container_name: visionary-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-visionary}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-visionary_tutor}
      MYSQL_USER: ${MYSQL_USER:-visionary}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-visionary}
    volumes:
      - visionary_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-visionary}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: visionary-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - visionary_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: visionary-chroma
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - visionary_chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  visionary_mysql_data:
  visionary_redis_data:
  visionary_chroma_data:
