name: Real Integration Loop

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/integration-test.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/integration-test.yml'
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Run live multi-agent MySQL Redis Chroma learning loop
        run: mvn -f backend/pom.xml -Pintegration verify

      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: real-multi-agent-integration-reports
          path: |
            backend/target/failsafe-reports/
            backend/target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14
